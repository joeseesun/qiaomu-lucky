name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently hard or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the product do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public draw page
        - Admin dashboard
        - Prize-code management
        - Deployment
        - Security/privacy
        - Documentation
        - Other
    validations:
      required: true
